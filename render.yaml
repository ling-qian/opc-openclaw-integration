services:
  - type: web
    name: opc-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: opc-db
          property: connectionString
    autoDeploy: true
    healthCheckPath: /api/health

databases:
  - name: opc-db
    databaseName: opc_platform
    plan: free
